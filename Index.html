<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Viewer</title>
    <!-- Updated fallback script link -->
    <script type="module" src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #ffffff; }
        /* Forces the container box to be visible on the screen */
        .viewer-container { width: 100%; height: 500px; margin-top: 20px; border: 2px dashed #ccc; background: #fafafa; }
        model-viewer { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <h1>AR-Viewer</h1>
    <p>Just an AR viewer to save your time instead of installing loads of random stuff or creating accounts on paid web platforms.</p>

    <!-- The viewer is wrapped in a container so it cannot collapse to 0 pixels -->
    <div class="viewer-container">
        <!-- REPLACE "your-house-model.glb" WITH YOUR EXACT FILE NAME -->
        <model-viewer src="your-house-model.glb" 
                      ios-src="your-house-model.glb"
                      ar 
                      ar-modes="webxr scene-viewer quick-look" 
                      camera-controls 
                      shadow-intensity="1" 
                      auto-rotate>
            <button slot="ar-button" style="background-color: #0052cc; color: white; border-radius: 4px; border: none; position: absolute; bottom: 16px; right: 16px; padding: 12px; font-weight: bold; cursor: pointer;">
                👋 Activate AR View
            </button>
        </model-viewer>
    </div>

</body>
</html>
