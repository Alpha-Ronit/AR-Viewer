<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free WebAR Viewer</title>
    <!-- Imports the Google Model Viewer structural script -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; background-color: #f0f0f0; }
    </style>
</head>
<body>

    <!-- Change "your-house-model.glb" to match your exact file name -->
    <model-viewer src="Shiny Wluff.glb" 
                  ar 
                  ar-modes="webxr scene-viewer quick-look" 
                  camera-controls 
                  shadow-intensity="1" 
                  auto-rotate>
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; bottom: 16px; right: 16px; padding: 12px;">
            👋 Activate AR View
        </button>
    </model-viewer>

</body>
</html>
